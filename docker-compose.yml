services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    shm_size: '1gb'
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - WATCHPACK_POLLING=true        # needed for hot reload inside Docker/WSL2
    volumes:
      - ./frontend:/app               # live code sync
      - /app/node_modules             # keep container's node_modules isolated
      - /app/.next                    # keep build cache inside container
    command: npm run dev
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./backend:/app
      - model_weights:/app/models   # persist downloaded weights
    depends_on:
      - redis

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A worker worker --loglevel=info
    environment:
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./backend:/app
      - model_weights:/app/models   # share weights with backend
    depends_on:
      - redis
      - backend

volumes:
  model_weights:
